            width: 18px;
            left: 3px;
            bottom: 3px;

            transition: .3s;

        }

        }

</head>

                for (let i = options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [options[i], options[j]] = [options[j], options[i]];
                }

            const cName = chapterNames[i] || `Topic ${i}`;
            
            if (quizData[i] && quizData[i].length > 0) {
                btn.innerHTML = `<strong style="color: var(--primary);">${cName}</strong><br> ${quizData[i].length} Questions`;
                btn.onclick = () => startQuiz(i);
            } else {
                btn.innerHTML = `Module ${i}: ${cName} <span style="font-size: 0.8em; color: var(--text-muted); float: right;">Pending Upload</span>`;
                btn.disabled = true;
                btn.style.opacity = "0.5";
            }
            list.appendChild(btn);
        }
    }

    function startQuiz(chapterNum) {
        currentChapterNum = chapterNum;
        currentQuestionIndex = 0;
        correctAnswersCount = 0;
        
        const cName = chapterNames[chapterNum] || "";
        document.getElementById('quiz-title').innerText = `Module ${chapterNum}`;
        document.getElementById('total-q-num').innerText = quizData[chapterNum].length;
        
        loadQuestion();
        switchSection('quiz-section');
    }

    function loadQuestion() {
        document.getElementById('ai-response').classList.add('hidden');
        
        // Respect AI Toggle State for Hint Button
        if (isAiEnabled) {
            document.getElementById('ai-hint-btn').classList.remove('hidden');
        } else {
            document.getElementById('ai-hint-btn').classList.add('hidden');
        }
        
        document.getElementById('next-btn').classList.add('hidden');
        
        document.getElementById('current-q-num').innerText = currentQuestionIndex + 1;
        
        const progress = (currentQuestionIndex / quizData[currentChapterNum].length) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;
        
        const currentQ = quizData[currentChapterNum][currentQuestionIndex];
        document.getElementById('question-text').innerText = currentQ.question;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        currentQ.options.forEach(option => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = option;
            btn.onclick = (e) => handleAnswer(option, currentQ.answer, e.target);
            optionsContainer.appendChild(btn);
        });
    }

    function handleAnswer(selectedOption, correctOption, clickedBtn) {
        const allButtons = document.querySelectorAll('.option-btn');
        allButtons.forEach(btn => btn.classList.add('disabled-btn'));

        if (selectedOption === correctOption) {
            correctAnswersCount++;
            clickedBtn.classList.add('btn-correct');
            setTimeout(() => { proceedToNext(); }, 1500); 
        } else {
            clickedBtn.classList.add('btn-wrong');
            allButtons.forEach(btn => {
                if (btn.innerText === correctOption) {
                    btn.classList.add('btn-correct');
                }
            });

            // Respect AI Toggle State for Auto-Triggering Explaination
            if (isAiEnabled) {
                getAIExplanation(true);
                document.getElementById('ai-hint-btn').classList.add('hidden');
            }
            document.getElementById('next-btn').classList.remove('hidden');
        }
    }

    function proceedToNext() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData[currentChapterNum].length) {
            loadQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        document.getElementById('progress-bar').style.width = '100%';
        const total = quizData[currentChapterNum].length;
        const percentage = Math.round((correctAnswersCount / total) * 100);
        
        document.getElementById('raw-score').innerText = `${correctAnswersCount} / ${total}`;
        document.getElementById('final-score').innerText = `${percentage}%`;
        
        silentGoogleSheetSubmit(percentage);
        
        setTimeout(() => { switchSection('results-section'); }, 500); 
    }

async function silentGoogleSheetSubmit(percentage) {
        if(GOOGLE_SHEET_WEBAPP_URL === "YOUR_WEB_APP_URL_HERE") return;
        try {
            // Get the chapter name if it exists
            const cName = chapterNames[currentChapterNum];
            // Format it as "Chapter 1: HTML Fundamentals" or just "Chapter 1" if no name exists
            const chapterData = cName ? `Chapter ${currentChapterNum}: ${cName}` : `Chapter ${currentChapterNum}`;

            const formData = new URLSearchParams();
            formData.append('name', studentName);
            formData.append('chapter', chapterData); // <-- Updated this line
            formData.append('score', `${percentage}%`);

            fetch(GOOGLE_SHEET_WEBAPP_URL, {
                method: 'POST',
                body: formData
            }).then(response => {
                if(response.ok) console.log("Score automatically saved.");
            }).catch(e => console.error("Network issue during silent save.", e));
        } catch (error) {
            console.error("Error triggering submit:", error);
        }
    }

    function backToChapters() {
        switchSection('chapters-section');
    }

    // --- Live Dual AI Integration (Debug Version) ---
    async function getAIExplanation(isAutoTrigger = false) {
        const activeKey = API_KEYS[ACTIVE_AI_PROVIDER];
        const aiBox = document.getElementById('ai-response');
        const currentQ = quizData[currentChapterNum][currentQuestionIndex];

        if (!activeKey || activeKey.includes("YOUR_")) {
            aiBox.classList.remove('hidden');
            aiBox.innerHTML = `<strong>Configuration Error:</strong> Valid API key not found for ${ACTIVE_AI_PROVIDER.toUpperCase()}.`;
            return;
        }
        
        aiBox.classList.remove('hidden');
        aiBox.innerHTML = `<em>${isAutoTrigger ? "Generating explanation..." : "Connecting to " + ACTIVE_AI_PROVIDER.toUpperCase() + "..."}</em>`;
        
        const promptText = `You are a Computer Architecture and Design tutor. A student is answering this multiple choice question: "${currentQ.question}". The correct answer is: "${currentQ.answer}". Provide a brief, one-paragraph explanation (max 1-3 sentences) of why this is the correct answer. Focus on explaining the underlying concept clearly. Do not use markdown formatting.`;

        try {
            let aiText = "";

            if (ACTIVE_AI_PROVIDER === 'gemini') {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${activeKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: { temperature: 0.3 }
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                const data = await response.json();
                aiText = data.candidates[0].content.parts[0].text;

            } else if (ACTIVE_AI_PROVIDER === 'groq') {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${activeKey}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [{ "role": "user", "content": promptText }],
                        temperature: 0.3
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                const data = await response.json();
                aiText = data.choices[0].message.content;
            }

            aiBox.innerHTML = `${aiText}`;

        } catch (error) {
            console.error("Detailed API Error:", error);
            
            let diagnosis = "";
            
            if (error.message.includes('Failed to fetch')) {
                diagnosis = "🚨 <strong>CORS / Browser Blocked:</strong> Your browser killed the request because you are running the file directly (file:///). You absolutely <strong>must</strong> use a local server (like the VS Code 'Live Server' extension) or host it online to bypass this security block.";
            } else if (error.message.includes('HTTP 400')) {
                diagnosis = "❌ <strong>API Key Invalid:</strong> The API rejected the key. It might be malformed or invalid.";
            } else if (error.message.includes('HTTP 401') || error.message.includes('HTTP 403')) {
                diagnosis = "🚫 <strong>Permission Denied:</strong> Your key is valid but lacks permissions, or authentication failed.";
            } else if (error.message.includes('HTTP 429')) {
                diagnosis = "⏱️ <strong>Quota Exceeded:</strong> You have hit the rate limit for this free key.";
            } else {
                diagnosis = `⚠️ <strong>System Error:</strong> ${error.message}`;
            }

            aiBox.innerHTML = diagnosis;
        }
    }
    
    // ==========================================
    // --- Keyboard Navigation ---
    // ==========================================
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            
            // 1. If on the Quiz screen and the "Continue" button is visible
            const nextBtn = document.getElementById('next-btn');
            if (nextBtn && !nextBtn.classList.contains('hidden')) {
                event.preventDefault(); 
                proceedToNext();
            }

            // 2. If on the Setup screen and typing in the Name box
            const setupSection = document.getElementById('setup-section');
            if (setupSection && !setupSection.classList.contains('hidden')) {
                if (document.activeElement.id === 'student-name') {
                    event.preventDefault();
                    startApp();
                }
            }
        }
    });
</script>
